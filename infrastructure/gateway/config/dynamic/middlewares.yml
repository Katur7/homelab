http:
  middlewares:
    internal-only:
      ipAllowList:
        sourceRange:
          - "192.168.86.0/24"   # LAN
          - "127.0.0.1/32"      # localhost/healthchecks
          - "172.24.0.0/24"     # traefik_internal to allow other containers to connect

    # crowdsec middleware is defined in crowdsec.yml (gitignored — contains LAPI key)

    my-rate-limit:
      rateLimit:
        average: 100
        burst: 200

    authelia-auth:
      forwardAuth:
        address: http://authelia:9091/api/verify?rd=https://auth.pippinn.me
        trustForwardHeader: true
        maxResponseBodySize: 4096
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email

    external-auth-chain:
      chain:
        middlewares:
          - crowdsec
          - my-rate-limit
          - authelia-auth

    external-no-auth-chain:
      chain:
        middlewares:
          - crowdsec
          - my-rate-limit

