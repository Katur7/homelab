http:
  routers:
    omv:
      entryPoints:
        - websecure
      rule: "Host (`omv.internal.pippinn.me`)"
      service: omv
    uptime:
      entryPoints:
        - websecure
      rule: "Host (`uptime.internal.pippinn.me`)"
      service: uptime
    pihole-on-pi:
      entryPoints:
        - websecure
      rule: "Host (`pihole-on-pi.internal.pippinn.me`)"
      service: pihole-on-pi

  services:
    omv:
      loadBalancer:
        servers:
          - url: "http://192.168.86.17:5080"
        passHostHeader: true
    uptime:
      loadBalancer:
        servers:
          - url: "http://192.168.86.26:3001"
        passHostHeader: true
    pihole-on-pi:
      loadBalancer:
        servers:
          - url: "http://192.168.86.26"
        passHostHeader: true
