# WireGuard VPN
# Road-warrior VPN — 4 peers, server on vpn.pippinn.me:51770
# No Docker network — standalone, communicates via host port

services:
  wireguard:
    image: ghcr.io/linuxserver/wireguard:1.0.20250521
    container_name: wireguard
    cap_add:
      - NET_ADMIN
    env_file:
      - ../../global.env
      - vars.env
    volumes:
      - ./config:/config
    ports:
      - "51770:51820/udp"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
