name: pihole

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: pihole-on-pi
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "80:80/tcp"
    env_file:
      - ../../global.env
      - vars.env
      - .env
    environment:
      PIHOLE_UID: 1000
      PIHOLE_GID: 1000
    volumes:
      - ./data:/etc/pihole
      - type: tmpfs
        target: /ftl-db    # FTL query database in RAM — no SD card writes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: nebula-sync
    restart: unless-stopped
    environment:
      # URL|PASSWORD — password comes from .env via compose substitution
      - PRIMARY=http://192.168.86.27|${PIHOLE_PASSWORD}
      - REPLICAS=http://pihole|${PIHOLE_PASSWORD}
      # Disable the full mirror to avoid locking issues
      - FULL_SYNC=false
      # Only sync the "Safe" data that isn't locked by environment variables
      - SYNC_ADLISTS=true
      - SYNC_WHITELIST=true
      - SYNC_BLACKLIST=true
      - SYNC_CLIENTS=true
      - SYNC_GROUPS=true
      # This pulls in local DNS (x.internal.y.z) and CNAMEs
      - SYNC_CONFIG_DNS=true
      # Exclude the "system" level DNS settings that Docker usually hardcodes
      - SYNC_CONFIG_DNS_EXCLUDE=upstreams,listeningMode,reply.host.IPv4,reply.host.force4
      # Disabled — Pi has FTLCONF_misc_privacylevel=3 locked via env var (SD card protection).
      # Nebula-sync cannot overwrite env-locked settings and returns 400 if it tries.
      - SYNC_CONFIG_MISC=false
      - RUN_GRAVITY=false
      - CRON=*/5 * * * *
      - WEBHOOK_SYNC_SUCCESS_URL=${UPTIME_PUSH_URL}
    depends_on:
      - pihole
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
