name: beszel-agent

services:
  beszel-agent:
    image: ghcr.io/henrygd/beszel-agent:0.18.6
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: 0.0.0.0:45876
      KEY: ${BESZEL_AGENT_KEY_NAS}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
