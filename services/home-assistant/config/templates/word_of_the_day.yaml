  - name: "Word of the Day Example 2 IS"
    unique_id: word_of_the_day_example2_is
    state: >
      {% set ex = state_attr('sensor.word_of_the_day', 'examples') %}
      {% if ex and ex|length > 1 %}
        {{ ex[1]['is'] }}
      {% else %}
